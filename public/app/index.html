          <overlay-modal class="taxonomy-modal" onclose="closeTaxonomyModal()" close-on-bg-click>
            <div slot="title">
              Make a filter
            </div>
            <div slot="content" class="container-spaced-large">
              <div class="container-spaced-medium container-horizontal">
                {{{getTaxonomySelectComponents(10, taxonomyMode)}}}
              </div>
              <model-viewer
                class="taxonomy-current-keywords-viewer container-vertical"
                model-type="Taxonomy"
                model-fields="keywords,regexPattern,tagName,isExperienceTag"
                hide-error-logs
              >
                <template slot="item">
                  <div class="container-vertical container-spaced-medium{{taxonomyMode !== 'tags' ? ' hidden': ''}}">
                    {{{getTaxonomyExperienceSelector(Taxonomy.tagName, Taxonomy.isExperienceTag)}}}
                    <b>Tag:</b>
                    <div class="taxonomy-modal-tag-display">
                      {{Taxonomy.tagName ? Taxonomy.tagName : 'None.'}}
                    </div>
                    <div class="taxonomy-modal-tag hidden">
                      {{Taxonomy.tagName ? Taxonomy.tagName : ''}}
                    </div>
                  </div>
                  <div class="container-vertical container-spaced-medium{{taxonomyMode === 'tags' ? ' hidden': ''}}">
                    <b>Keywords:</b>
                    <div class="taxonomy-modal-keywords-display">
                      {{Taxonomy.keywords ? formatKeywords(Taxonomy.keywords, ', ') : 'None.'}}
                    </div>
                    <div class="taxonomy-modal-keywords hidden">
                      {{Taxonomy.keywords ? formatKeywords(Taxonomy.keywords, '|') : ''}}
                    </div>
                  </div>
                  <div class="container-vertical container-spaced-medium{{taxonomyMode === 'tags' ? ' hidden': ''}}">
                    <b>Regular expressions:</b>
                    <div class="taxonomy-modal-regex-display">
                      {{Taxonomy.regexPattern ? formatRegExp(Taxonomy.regexPattern, ', ') : 'None.'}}
                    </div>
                    <div class="taxonomy-modal-regex hidden">
                      {{Taxonomy.regexPattern ? formatRegExp(Taxonomy.regexPattern, '|') : ''}}
                    </div>
                  </div>
                  <div>
                    {{
                      ((inputClass) => {
                        window.currentTaxonomyInputClassName = `.${inputClass}`;
                        return '';
                      })(inputClassName)
                    }}
                    {{{
                      ((keywords, regexPattern, tagName) => {
                        let mode = '{{taxonomyMode}}';
                        let buttons = [];
                        if (mode === 'tags') {
                          buttons.push(
                            tagName ? `<input type="button" value="Apply" onclick="applyTaxonomyModalOutput('.taxonomy-modal-tag')">` : '<input type="button" value="Apply tag" disabled>'
                          );
                          buttons.push(
                            tagName ? `<input type="button" value="Apply as AND" onclick="applyTaxonomyModalOutput('.taxonomy-modal-tag', '&&')">` : '<input type="button" value="Apply as AND" disabled>'
                          );
                          buttons.push(
                            tagName ? `<input type="button" value="Apply as OR" onclick="applyTaxonomyModalOutput('.taxonomy-modal-tag', '||')">` : '<input type="button" value="Apply as OR" disabled>'
                          );
                        } else {
                          buttons.push(
                            keywords ? `<input type="button" value="Apply keywords" onclick="applyTaxonomyModalOutput('.taxonomy-modal-keywords')">` : '<input type="button" value="Apply keywords" disabled>'
                          );
                          buttons.push(
                            regexPattern ? `<input type="button" value="Apply regex" onclick="applyTaxonomyModalOutput('.taxonomy-modal-regex')">` : '<input type="button" value="Apply regex" disabled>'
                          );
                        }
                        return buttons.join(' ');
                      })(Taxonomy.keywords, Taxonomy.regexPattern, Taxonomy.tagName)
                    }}}
                  </div>
                </template>
                <template slot="no-item">
                  <div>No {{taxonomyMode || 'keywords'}} at this level.</div>
                </template>
                <div class="container-vertical container-spaced-large" slot="viewport"></div>
              </model-viewer>
            </div>
          </overlay-modal>
        </template>

              </model-viewer>
            </div>
            <div slot="content">
              <form class="container-vertical container-spaced-medium" onsubmit="mergeLonglist(event, '{{longlistId}}')">
                <input-provider
                  class="merge-target-project"
                  type="text"
                  consumers=".merge-target-projects-container:collection-view-params"
                  provider-template="accountId={{socket.authToken ? socket.authToken.accountId : ''}}{{value ? ',query=(?i)' + value : ''}}"
                  placeholder="Type to search projects..."
                ></input-provider>
                <collection-viewer
                  class="merge-target-projects-container"
                  collection-type="Longlist"
                  collection-fields="id,name"
                  collection-view="accountNameView"
                  collection-view-params="accountId={{socket.authToken ? socket.authToken.accountId : ''}}"
                  collection-page-size="1"
                >
                  <template slot="item">
                    <label class="checkbox-container merge-project-result-item container-horizontal container-centered-cross container-spaced-medium limited-width-label">
                      <input-provider
                        class="merge-target-project-input"
                        type="checkbox"
                        name="targetProject"
                        data-project-id="{{Longlist.id}}"
                        data-project-name="{{Longlist.name}}"
                      ></input-provider>
                      <div>
                        Merge with project: <b>{{Longlist.name}}</b>
                      </div>
                    </label>
                  </template>
                  <template slot="no-item">
                    <div class="merge-project-result-item">No matching projects found.</div>
                  </template>
                  <div slot="viewport" class="container-vertical container-spaced-large"></div>
                </collection-viewer>
                <input-provider
                  class="merge-new-project-name"
                  type="text"
                  name="newProjectName"
                  placeholder="Enter new name for merged project"
                ></input-provider>
                <input class="merge-longlist-submit-button" type="submit" value="Merge Projects">
              </form>
            </div>
          </overlay-modal>
        </template>
        <template slot="page" route-path="/add-to-longlist" partial-route no-auth-redirect="/log-in/longlist-log-in">
          <overlay-modal class="add-to-longlist-modal full-modal" onclose="closeAddToLonglistModal()" close-on-bg-click>
            <div slot="title">
              Add to project
            </div>
            <div slot="content">
              <form class="container-vertical container-spaced-medium" onsubmit="addToLonglist(event)">
                <collection-viewer
                  collection-type="Longlist"
                  collection-fields="name,createdAt,accountId"
                  collection-view="accountRecentView"
                  collection-view-params="accountId={{socket.authToken ? socket.authToken.accountId : ''}}"
                  collection-page-size="10"
                >
                  <template slot="item">
                    <div class="container-horizontal container-spaced-medium container-centered-cross">
                      <input class="add-to-longlist-submit-button" type="submit" data-longlist-id="{{Longlist.id}}" data-longlist-account-id="{{Longlist.accountId}}" value="Add">
                      <div class="add-to-longlist-name">{{(Longlist.name || 'Unnamed')}} - {{date(Longlist.createdAt)}}</div>
                    </div>
                  </template>

                  <template slot="no-item">
                    <div class="container-vertical container-centered-cross container-centered-main" style="height: 100px;">No projects were found.</div>
                  </template>

                  <template slot="loader">
                    <div class="loading-spinner-container">
                      <div class="spinning">&#8635;</div>
                    </div>
                  </template>

                  <input slot="previous-page" type="button" value="Prev">
                  <div slot="page-number"></div>
                  <input slot="next-page" type="button" value="Next">

                  <div slot="viewport" class="longlist-add-to-list-viewport container-vertical container-spaced-large"></div>
                </collection-viewer>
              </form>
            </div>
          </overlay-modal>
        </template>
        <template slot="page" route-path="/company-selection-modal/selection-view" partial-route>
          <overlay-modal class="company-selection-viewer-modal full-modal" onclose="closeCompanySelectionModal()" close-on-bg-click>
            <div slot="title">
              Current company selection<span class="company-selection-count"></span>
            </div>
            <div slot="content">
              {{{getCompanySelectionViewerComponent(true)}}}

              <input-combiner
                class="company-exclude-combiner"
                consumers=".main-app-router:target-page"
                provider-template="{{excludeCompanies(value)}}"
                debounce-delay="200"
              ></input-combiner>

              <input-transformer
                class="company-selection-viewer-offset-transformer"
                consumers=".company-selection-viewer:collection-page-offset"
                provider-template="{{value > 0 ? (value - 1) * companyViewerPageSize : 0}}"
              ></input-transformer>
            </div>
          </overlay-modal>
        </template>
        <template slot="page" route-path="/manage-data-group/:dataGroupId" partial-route no-auth-redirect="/log-in/custom-data-log-in">
          <overlay-modal class="manage-data-group-modal full-modal" onclose="closeDataGroupManagerModal()" close-on-bg-click>
            <div slot="title">
              Manage Data Groups
            </div>
            <div slot="content" class="container-vertical container-spaced-large">
              <div class="container-vertical container-spaced-small">
                <div class="data-group-adder-error-message error"></div>
                <div class="data-group-adder-success-message success"></div>
                <collection-adder-form
                  class="container-vertical container-spaced-small"
                  collection-type="DataGroup"
                  model-values="accountId={{socket.authToken ? socket.authToken.accountId : ''}}"
                  error-consumers=".data-group-adder-error-message"
                  success-consumers=".data-group-adder-success-message"
                  provider-template="{{value.error ? `Failed to create data group. ${Object.values(value.error.fieldErrors || {})[0] || 'Format error'}.` : 'Data group was created.'}}"
                  trim-spaces
                >
                  <div class="container-horizontal container-spaced-small">
                    <input class="data-group-name-input" type="text" name="name" placeholder="Data group name">
                    <input type="button" value="Create" onclick="submitCreateDataGroupForm(this.parentElement.parentElement)">
                    <input type="button" value="Search" onclick="searchDataGroup()">
                  </div>
                </collection-adder-form>
              </div>
              <collection-reducer
                class="data-group-manager-reducer"
                collection-type="DataGroup"
                collection-fields="name"
                collection-view="accountSearchView"
                collection-view-params="accountId={{socket.authToken ? socket.authToken.accountId : ''}},query='{{getNormalizedFiltersFromQuery(getParamValueFromURL('data-group-filter') || ``)}}'"
                collection-page-size="10"
                collection-page-offset="0"
              >
                <template slot="item">
                  <label class="container-horizontal container-centered-cross container-spaced-medium">
                    Manage group:
                    <input-provider
                      class="data-group-selector"
                      name="dataGroup"
                      type="select"
                      options="{{DataGroup.map(group => (group.name || '') + '=' + group.id).join(',')}}"
                      value="{{dataGroupId}}"
                      consumers=".data-group-selector-transformer"
                      placeholder="Data group"
                    ></input-provider>

                    <input-transformer
                      class="data-group-selector-transformer"
                      provider-template="{{location.href = getURLWithParamValues({ 'manage-data-group': value, 'data-group-filter': getParamValueFromURL('data-group-filter') })}}"
                      consumers="#null-consumer"
                    ></input-transformer>
                    <a href="{{location.hash}}/share-data-group/{{dataGroupId}}" class="share-button">&#128228;</a>
                  </label>
                </template>
                <div slot="viewport" class="container-vertical container-spaced-large"></div>
              </collection-reducer>

              {{{getDataGroupPrimaryTabsComponent()}}}

              <collection-viewer
                class="data-group-collection-viewer importer-viewer"
                collection-type="DataGroup"
                collection-fields="name,accountId"
                collection-view="idView"
                collection-view-params="id={{dataGroupId}}"
                collection-page-size="1"
              >
                <template slot="item">
                  <div class="container-vertical container-spaced-large">
                    <app-router default-page="/data-group-mode/crawl">
                      <template slot="page" route-path="/data-group-mode/:dataGroupMode" partial-route>
                        {{{getDataGroupCrawlSettingsComponent(dataGroupMode, dataGroupId, DataGroup.accountId, socket)}}}
                      </template>
                      <div slot="viewport" class="container-vertical container-spaced-large"></div>
                    </app-router>

                    <div>
                      <input type="button" value="Bump up data group" onclick="bumpUpDataGroup(`{{DataGroup.id}}`, `{{DataGroup.name}}`)">
                    </div>
                    <collection-deleter class="data-group-deleter data-group-importer-container" model-id="{{DataGroup.id}}" confirm-message="Are you sure you want to delete the {{DataGroup.name}} data group?" onclick="confirmDeleteItem()">
                      <input class="data-group-deleter-button" type="button" value="Delete {{DataGroup.name}} data group">
                    </collection-deleter>
                    <div class="crawl-result-container"></div>
                  </div>
                </template>
                <div slot="viewport" class="data-group-collection-viewport"></div>
                <confirm-modal slot="modal" title="Delete confirmation" message="" confirm-button-label="Delete"></confirm-modal>
              </collection-viewer>
              <app-router>
                <template slot="page" route-path="/share-data-group/:shareDataGroupId" partial-route>
                  <overlay-modal class="data-group-share-modal" onclose="event.stopPropagation(); closeShareDataGroupModal()" close-on-bg-click>
                    <div slot="title">
                      Share data group:
                      <model-viewer
                        style="display: inline-block;"
                        model-type="DataGroup"
                        model-id="{{shareDataGroupId}}"
                        model-fields="name"
                      >
                        <template slot="item">
                          {{DataGroup.name || 'Unnamed'}}
                        </template>
                        <div slot="viewport"></div>
                      </model-viewer>
                    </div>
                    <div slot="content">
                      <form class="container-vertical container-spaced-medium" onsubmit="shareDataGroup(event, '{{shareDataGroupId}}')">
                        <model-viewer
                          class="account-lookup-viewer"
                          model-type="Account"
                          model-fields="username"
                        >
                          <template slot="item">
                            Found: <b>{{Account.username}}</b>
                            <input-transformer
                              consumers=".share-data-group-submit-button:disabled"
                              value="false"
                              output-type="boolean"
                            ></input-transformer>
                          </template>
                          <template slot="no-item">
                            <span class="error">No matching account was found.</span>
                            <input-transformer
                              consumers=".share-data-group-submit-button:disabled"
                              value="true"
                              output-type="boolean"
                            ></input-transformer>
                          </template>
                          <div slot="viewport"></div>
                        </model-viewer>
                        <input-provider
                          name="targetAccountId"
                          type="text"
                          consumers=".account-lookup-viewer:model-id"
                          placeholder="Account ID"
                        ></input-provider>
                        <input class="share-data-group-submit-button" type="submit" value="Share" disabled>
                      </form>
                    </div>
                  </overlay-modal>
                </template>
                <div slot="viewport"></div>
              </app-router>
            </div>
          </overlay-modal>
        </template>
        <template slot="page" route-path="/data-source/custom" partial-route no-auth-redirect="/log-in/custom-data-log-in"></template>
        <div slot="viewport" class="container-vertical"></div>
      </app-router>
    </socket-provider>
  </body>
</html>
