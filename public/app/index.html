      function getDashboardURLHash() {
        let companyFilterTags = getFilterFromLocationHash('company-filter', 'tags', 'index-equals');
        if (!companyFilterTags) return `#/dashboard/company-filter/tags%20index-equals%20position%3Aelectronics-engineering/company-page/1/companies//people-filter/tags%20contains%20position%3Aelectronics-engineering/minimal-view/hardware`;
        let tagBasePart = getFilterFromLocationHash('company-filter', 'tags', 'index-equals', extractCompanyTagBasePart);
        let tagExpPart = getFilterFromLocationHash('company-filter', 'tags', 'index-equals', extractCompanyTagExperiencePart);
        let tagWithExp = getBaseExpTag(tagBasePart, tagExpPart);
        let companyFilterRegion = getFilterFromLocationHash('company-filter', 'companyHqRegion', 'contains');
        let companyPart = encodeURIComponent(`${companyFilterRegion ? `companyHqRegion contains (?i)${companyFilterRegion} ~AND~ ` : ''}tags index-equals ${companyFilterTags}`);
        let peoplePart = encodeURIComponent(`tags contains ${tagWithExp}`);
        let minimalViewPart = getPartFromURL('minimal-view');
        if (minimalViewPart) {
          minimalViewPart = `minimal-view/${minimalViewPart}`;
        } else {
          minimalViewPart = '';
        }
        return `#/dashboard/company-filter/${companyPart}/company-page/1/companies//people-filter/${peoplePart}/${minimalViewPart}`;
      }

      function normalizeString(str) {
        if (!str) return '';
        return str
          .normalize('NFD')
          .toLowerCase()
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/[\x00-\x1F]/g, '')
          .replace(/&amp;/g, '&')
          .replace(/&lt;/g, '<')
          .replace(/&gt;/g, '>')
          .replace(/&quot;/g, '"')
          .replace(/&#39;/g, "'")
          .replace(/&nbsp;/g, ' ')
          .trim()
          .replace(/\s+/g, ' ');
      }

      function goToDashboard() {
        location.hash = getDashboardURLHash();

      async function resetCrawl() {
        let crawlResultContainer = document.querySelector('.crawl-result-container');
        if (crawlResultContainer) {
          crawlResultContainer.innerHTML = '';
        }
        await stopCrawl({ reset: true });
        resetCrawledDataImport();

      function getImportSettings(taxoId, tagName, regexPattern, isExperienceTag) {
        let importSettings = {};
        if (tagName && regexPattern) {
          importSettings.tags = [
            {
              tagName,
              regexPattern: regexPattern ? formatRegExp(regexPattern, '|') : null,
              isExperienceTag: isExperienceTag === 'true'
            }
          ];
        } else {
          importSettings.tags = [];
        }
        
        importSettings.crawlExtensionExists = !!document.querySelector('#crawlkeep-importer-extension-container');

        if (taxoId) {
          importSettings.crawlTagTaxonomyParentId = taxoId;
        }
        
        let importEmptyCompanies = document.querySelector('.import-empty-companies-input');
        if (importEmptyCompanies) {
          importSettings.importEmptyCompanies = importEmptyCompanies.value;
        }

        let crawlSeedIncludeCompaniesInput = document.querySelector('.crawl-seed-project-include-companies-input');
        importSettings.crawlSeedIncludeCompanies = crawlSeedIncludeCompaniesInput?.value || '';

        let crawlPrimaryKeywordRegexInput = document.querySelector('.crawl-primary-keyword-regex-input');
        importSettings.crawlPrimaryKeyword = crawlPrimaryKeywordRegexInput?.value ? crawlPrimaryKeywordRegexInput.value : '';
        
        let crawlSecondaryKeywordRegexInput = document.querySelector('.crawl-secondary-keyword-regex-input');
        importSettings.crawlSecondaryKeyword = crawlSecondaryKeywordRegexInput?.value ? crawlSecondaryKeywordRegexInput.value : '';

        let crawlSeedProjectInput = document.querySelector('.crawl-seed-project-input');
        importSettings.crawlSeedLonglistId = crawlSeedProjectInput?.getAttribute('data-project-id') || null;
        importSettings.crawlLocation = (document.querySelector('.crawl-location-input')?.value || '').trim();
        importSettings.crawlIndustry = (document.querySelector('.crawl-industry-input')?.value || '').trim();

        let aiPrompt = (document.querySelector('.crawl-desc-input')?.value || '').trim();
        if (aiPrompt) {
          importSettings.crawlAIPrompt = {
            tag: 'profile0',
            category: aiPrompt,
            sensitivity: 0.5,
            focus: { headline: 0.5, summary: 0.5, skills: 0.5, jobs: 0.5, educations: 0.5 }
          };
        } else {
          importSettings.crawlAIPrompt = null;
        }

        let companyAIPrompt = (document.querySelector('.crawl-company-desc-input')?.value || '').trim();
        if (companyAIPrompt) {
          importSettings.crawlCompanyAIPrompt = {
            tag: 'company0',
            category: companyAIPrompt,
            sensitivity: 0.5
          };
        } else {
          importSettings.crawlCompanyAIPrompt = null;
        }

        importSettings.crawlEmployeeAIFactor = 1;
        importSettings.crawlCompanyAIFactor = parseFloat(document.querySelector('.crawl-company-ai-factor-input')?.value) ?? 1;

        importSettings.crawlCompanySizeTarget = parseInt(document.querySelector('.crawl-company-size-input')?.value);
        importSettings.crawlSeedEmployeesCount = parseInt(document.querySelector('.crawl-seed-employees-count-input')?.value) || 1;
        importSettings.crawlExplorationFactor = parseInt(document.querySelector('.crawl-exploration-input')?.value);
        importSettings.crawlSkillFactor = parseInt(document.querySelector('.crawl-skill-input')?.value);
        importSettings.crawlCurrentJobFactor = parseInt(document.querySelector('.crawl-current-job-input')?.value);
        importSettings.crawlPastJobFactor = parseInt(document.querySelector('.crawl-past-job-input')?.value);
        importSettings.crawlLocationFactor = parseInt(document.querySelector('.crawl-location-factor-input')?.value);

        importSettings.crawlDepth = parseInt(document.querySelector('.crawl-depth-input')?.value);
        importSettings.crawlBreadth = parseInt(document.querySelector('.crawl-breadth-input')?.value);
        importSettings.crawlPause = parseInt(document.querySelector('.crawl-pause-input')?.value);
        importSettings.crawlPauseProbability = .1;
        importSettings.crawlRandomness = parseInt(document.querySelector('.crawl-randomness-input')?.value);
        importSettings.crawlStartSampleSize = parseInt(document.querySelector('.crawl-start-sample-size-input')?.value);
        importSettings.crawlFindDirectEmployeesOnly = document.querySelector('.crawl-find-direct-employees-only-input')?.value || false;
        importSettings.crawlOnlyEmployees = document.querySelector('.only-employees-checkbox')?.checked || false;
        importSettings.crawlAIScoreThreshold = parseFloat(document.querySelector('.crawl-ai-score-threshold-input')?.value) || 0.5;

        importSettings.crawlType = getParamValueFromURL('data-group-crawl-type');

        let crawlCompanyIdsInput = document.querySelector('.crawl-company-ids-input');
        if (crawlCompanyIdsInput?.value?.trim()) {
          // TODO: These values will be passed to LI API so we should sanitize them without removing
          // flexibility of having URLs or universal names.
          let companyIdsText = crawlCompanyIdsInput.value.trim();
          let companyIds = companyIdsText
            .split(/[,\n\r]+/)
            .map(id => id.trim())
            .filter(id => id);
          importSettings.crawlCompanyIds = companyIds;
        }

        let discoveredEmployees = document.querySelector('.importer-discovered-employees-container')?.innerHTML?.split(',')?.length || 0;
        if (discoveredEmployees) {
          importSettings.crawlResume = true;
        }

        return importSettings;
      }

      async function updateBrowsablePersons(personId, browsablePersonIdList) {
        let currentIndex = browsablePersonIdList.indexOf(personId);
        let socketProvider = document.querySelector('.main-socket-provider');
        let socket = socketProvider.getSocket();

        if (currentIndex === -1 || currentIndex === 0 || currentIndex === browsablePersonIdList.length - 1) {
          let prevPersonId;
          let nextPersonId;
          let personIdList;
          let longlistId = getPartFromURL('longlists') || '';
          let peopleFilterQuery = getParamValueFromURL('people-filter') || '';

          if (longlistId) {
            let candidates = await getRecords({
              socket,
              type: 'Candidate',
              viewName: 'longlistSearchView',
              viewParams: {
                longlistId,
                query: getNormalizedFiltersFromQuery(peopleFilterQuery),
                sortBy: decodeURIComponent(getParamValueFromURL('people-sort') || 'firstNameLastName')
              },
              fields: [ 'personId' ]
            });
            personIdList = candidates.map(candidate => candidate.personId);
          } else if (peopleFilterQuery != null || getParamValueFromURL('data-source') || getParamValueFromURL('employee-view')) {
            // Dashboard employee view (both custom and main data sources)
            let isCustomDataSource = getParamValueFromURL('data-source') === 'custom';
            let employeeViewer = document.querySelector('.employee-viewer');
            let employeeViewerView = employeeViewer?.getAttribute('collection-view') || '';
            let hasCompanySearchFilter = !isCustomDataSource && employeeViewerView === 'companySearchView';
            let query = peopleFilterQuery ? getNormalizedFiltersFromQuery(decodeURIComponent(peopleFilterQuery)) : '';

            if (hasCompanySearchFilter) {
              let viewParamsStr = employeeViewer.getAttribute('collection-view-params') || '';
              let currentCompanyIdMatch = viewParamsStr.match(/currentCompanyId='([^']*)'/);
              let currentCompanyId = currentCompanyIdMatch ? currentCompanyIdMatch[1] : '';
              personIdList = await getRecordIds(
                socket,
                'Person',
                'companySearchView',
                { currentCompanyId, query },
                0,
                10,
                100
              );
            } else {
              let viewName = isCustomDataSource ? 'groupIdQuerySortView' : 'tagSearchSortView';
              let sortByPrev = isCustomDataSource ? 'aiScoreId asc' : 'firstNameLastName desc';
              let sortByNext = isCustomDataSource ? 'aiScoreId desc' : 'firstNameLastName asc';

              let baseViewParams;
              if (isCustomDataSource) {
                let dataGroupId = getParamValueFromURL('source-id') || '';
                baseViewParams = { dataGroupId, query };
              } else {
                let tags = (getIndexedFiltersFromCompanyQueryObject(getParamValueFromURL('company-filter')).tags || '').replace(/[.]count-[0-9]+$/, '');
                baseViewParams = { tags, query };
              }

              // Fetch current person's name to use for comparison
              let currentPerson = await getRecord({
                socket,
                type: 'Person',
                fields: [ 'id', 'firstName', 'lastName', 'aiScore' ],
                id: personId
              });

              let prevFilter = isCustomDataSource ? `aiScore > ${currentPerson.aiScore ?? 0} ~OR8~ aiScore = ${currentPerson.aiScore ?? 0} ~AND9~ id > ${currentPerson.id}` : `firstName < ${currentPerson.firstName} ~OR8~ firstName = ${currentPerson.firstName} ~AND9~ lastName < ${currentPerson.lastName}`;
              let nextFilter = isCustomDataSource ? `aiScore < ${currentPerson.aiScore ?? 0} ~OR8~ aiScore = ${currentPerson.aiScore ?? 0} ~AND9~ id < ${currentPerson.id}` : `firstName > ${currentPerson.firstName} ~OR8~ firstName = ${currentPerson.firstName} ~AND9~ lastName > ${currentPerson.lastName}`;

              let [ prevPersonIds, nextPersonIds ] = await Promise.all([
                getRecordIds(
                  socket,
                  'Person',
                  viewName,
                  {
                    ...baseViewParams,
                    query: baseViewParams.query ? `${baseViewParams.query} ~AND~ ${prevFilter}` : prevFilter,
                    sortBy: sortByPrev
                  },
                  0,
                  1,
                  1
                ),
                getRecordIds(
                  socket,
                  'Person',
                  viewName,
                  {
                    ...baseViewParams,

      async function uploadFilterFile(files) {
        let fileList = Array.from(files);
        let file = fileList[0];
        if (!file) return;
        let isRawText = false;
        try {
          let rawData = await new Promise((resolve, reject) => {
            let reader = new FileReader();
            reader.onload = (event) => {
              try {
                let jsonData = JSON.parse(event.target.result);
                resolve(jsonData);
              } catch (error) {
                isRawText = true;
                resolve(event.target.result);
              }
            };
            reader.onerror = () => {
              reject(reader.error);
            };
            reader.readAsText(file);
          });
          let filterValues = rawData
            .replace(/\r/g, '')
            .replace(/,/g, '\n')
            .split('\n')
            .map(line => line.replace(/.*\//, '').trim())
            .filter(Boolean);
          window.currentFilterUploadValues = filterValues;
        } catch (error) {
          window.currentFilterUploadValues = null;
          console.error(`Failed to upload filter because of error: ${error.message}`);
        }
      }

      let incompleteFilter = /( contains | contains \(\?i\)| = | > | >= | < | <= | index-equals )$/;

      function combineActiveFilters(filterMap, defaultFieldParts) {
        filterMap = mergePartialParams(filterMap, defaultFieldParts);
        let filterEntries = Object.entries(filterMap);
        filterEntries.sort(([ keyA ], [ keyB ]) => {
          if (keyA < keyB) {
            return -1;
          }
          if (keyA > keyB) {
            return 1;
          }
          return 0;
        });
        return filterEntries
          .map(([ key, filter ]) => filter)
          .filter(
            filter => !filter.match(incompleteFilter)
          ).join(' ~AND~ ');
      }

      async function initImportStream() {
        while (true) {
          console.log('Crawl import stream opened.');
          for await (let detail of crawlImportStream) {
            try {
              let { crawlSettings } = detail;
              let data = detail.data || {};
              if (!data.companies) data.companies = [];
              if (!data.employees) data.employees = [];
              let done = detail.done;
              let dataGroupId = getPartFromURL('manage-data-group');
              let serviceSocket = getServiceSocket();
              if (data.companies.length || data.employees.length) {
                console.log('Importing crawled data...', data);
                await importCrawledData(data, dataGroupId, serviceSocket, crawlSettings, '.file-import-loader', '.dashboard-app-router');
              } else {
                console.log('No crawled data was received.');
              }
              console.log(`Crawl import stream backpressure: ${crawlImportStream.getBackpressure()}`);
              if (done) {
                console.log('Finalizing crawled data...');
                await finishImportingCrawledData(serviceSocket, crawlSettings.tags, '.file-import-loader', '.dashboard-app-router');
                console.log('Done importing crawled data.');
              }
            } catch (error) {
              console.error(`Failed to import crawled data because of error: ${error.message}`);
            }
          }
          console.log('Crawl import stream closed.');
        }
      }

      async function applyEmployeeFilterToCompanies(isReset) {
        let includedCompanies = (getPartFromURL('companies') || '').split('+')
          .filter(companyId => companyId && companyId !== nullCompanyId);

        let currentProcessingIndex = ++employeeFilterProcessingIndex;
        if (isProcessingEmployeeFilter) {
          isProcessingEmployeeFilter = false;
          resetCompanyEmployeeFilterButton();
          return;
        }
        let companyFilterQuery = getPartFromURL('company-filter') || '';
        let peopleFilterQuery = getPartFromURL('people-filter');
        if (isReset) {
          isProcessingEmployeeFilter = false;
          location.hash = getURLWithParamValues({
            'selected-companies': '',
            'processed-company-count': '0'
          }, true);
          resetCompanyEmployeeFilterButton();
          return;
        };
        isProcessingEmployeeFilter = true;

        // Remove list of company IDs from the filter which might have been added in
        // a previous round of filtering.

        let cleanCompanyFilter = decodeURIComponent(companyFilterQuery);

        let dataSource = getPartFromURL('data-source');
        // Remove tag index filtering if data source is custom.
        if (dataSource === 'custom') {
          cleanCompanyFilter = cleanCompanyFilter.split(' ~AND~ ').filter(part => !part.startsWith('tags index-equals ')).join(' ~AND~ ');
        }

        let existingCompanyIds = (getParamValueFromURL('selected-companies') || '')
          .split('+')
          .filter(companyId => companyId && companyId !== nullCompanyId);
        filteredCompanySet = new Set([ ...existingCompanyIds, ...includedCompanies ]);
        totalCompanyCount = 0;
        processedCompanyCount = parseInt(getParamValueFromURL('processed-company-count') || '0');
        companyFilterCurrentPage = Math.floor(processedCompanyCount / crossFilterCompaniesPerPage);

        let cleanEncodedCompanyFilter = encodeURIComponent(cleanCompanyFilter);

        updateCompanyFilterButtonProcessingStatus();

        try {
          totalCompanyCount = await getCompanyCountByCompanyFilter(cleanEncodedCompanyFilter);

          if (employeeFilterProcessingIndex > currentProcessingIndex) return;

          isProcessingEmployeeFilter = totalCompanyCount > 0;

          let maxPageCount = companyFilterCurrentPage + crossFilterMaxPages;

          for (let i = companyFilterCurrentPage; i < maxPageCount; i++) {
            if (!isProcessingEmployeeFilter) break;
            if (employeeFilterProcessingIndex > currentProcessingIndex) return;
    
            let peopleNormalFilterQuery = getNormalizedFiltersFromQuery(peopleFilterQuery);
            let prospectiveCompanyIds = await getCompanyIdsByCompanyFilter(
              cleanEncodedCompanyFilter,
              i,
              1,
              crossFilterCompaniesPerPage
            );
            let peopleFilterParts = peopleNormalFilterQuery.split(' ~AND~ ');
            let companyFilterParts = cleanCompanyFilter.split(' ~AND~ ');
            let companyFilterTag = companyFilterParts.find(part => part.indexOf('tags index-equals ') === 0) || '';
            let isDefaultPeopleFilter = (
              !peopleFilterParts.length ||
              (
                peopleFilterParts.length === 1 &&
                peopleFilterParts[0] === companyFilterTag.replace(/in-position:/, 'position:').replace(/^tags index-equals /, 'tags contains ')
              )
            );

            if (!prospectiveCompanyIds.length) break;
            if (!isProcessingEmployeeFilter) break;
            if (employeeFilterProcessingIndex > currentProcessingIndex) return;

            let presentCompanyIds;
            if (isDefaultPeopleFilter) {
              presentCompanyIds = prospectiveCompanyIds.filter(companyId => companyId);
            } else {
              let employeeIds = await getEmployeeIdsByPeopleFilter(prospectiveCompanyIds, peopleNormalFilterQuery);
              if (!isProcessingEmployeeFilter) break;
              if (employeeFilterProcessingIndex > currentProcessingIndex) return;
              let personCompanyIdMap = await getCompanyIdsByEmployeesMap(employeeIds);
              if (!isProcessingEmployeeFilter) break;
              if (employeeFilterProcessingIndex > currentProcessingIndex) return;
              presentCompanyIds = Object.values(personCompanyIdMap)
                .filter(Boolean)
                .flatMap(companyId => companyId.split(',').map(id => id.trim()))
                .filter(Boolean);
            }

            for (let companyId of presentCompanyIds) {
              if (filteredCompanySet.size < crossFilterMaxCompanies) {
                filteredCompanySet.add(companyId);
              }
            }

            processedCompanyCount += prospectiveCompanyIds.length;
            updateCompanyFilterButtonProcessingStatus();

            if (processedCompanyCount >= totalCompanyCount) {
              processedCompanyCount = totalCompanyCount;
              break;
            };
            if (filteredCompanySet.size >= crossFilterMaxCompanies) break;
            await sleep(crossFilterSleepDuration);
            companyFilterCurrentPage = i;
          }
          isProcessingEmployeeFilter = false;

          let uniqueCompanyIds = [ ...filteredCompanySet ];
          if (!uniqueCompanyIds.length) {
            uniqueCompanyIds.push(nullCompanyId);
          }

          location.hash = getURLWithParamValues({
            'selected-companies': uniqueCompanyIds.join('+'),
            'processed-company-count': processedCompanyCount
          }, true);

          resetCompanyEmployeeFilterButton();
        } catch (error) {
          console.error(error);
          isProcessingEmployeeFilter = false;
          resetCompanyEmployeeFilterButton();
        }
      }

      async function importToLonglist(companyIds, peopleFilterQuery, existingLonglistId, existingLonglistAccountId) {
        companyIds = companyIds.flatMap(companyId => companyId.split(',').map(id => id.trim()));
        if (isGeneratingLonglist) return;
        
        // Always exclude when generated from summary page.
        location.hash = location.hash.replace(/\/longlist\/[^\/]*/, '');
        companyIds = companyIds.filter(companyId => companyId && companyId !== nullCompanyId);

        if (!companyIds.length) {
          showErrorModal('longlist-empty');
          return;
        }
        if (currentPersonCount > maxLonglistLength) {
          showErrorModal('longlist-too-long');
          return;
        }
        let socketProvider = document.querySelector('.main-socket-provider');
        if (!socketProvider) {
          showErrorModal('unexpected-failure');
          return;
        }

        isGeneratingLonglist = true

        let socket = socketProvider.getSocket();
        if (socket.authState !== 'authenticated') {
          if (!location.hash.includes('/log-in/longlist-log-in')) {
            location.hash = `${location.hash}/log-in/longlist-log-in`;
          }
          let canceledAuth = false;
          await Promise.race([
            socket.listener('authenticate').once(),
            new Promise((resolve) => {
              cancelAuth = resolve;
            })
          ]);
        }
        
        if (socket.authState === 'authenticated') {
          let longlistId;
          location.hash = location.hash.replace(/\/log-in\/[^\/]*/, '');
          let accountId = existingLonglistAccountId ? existingLonglistAccountId : socket.authToken.accountId;
          try {
            if (existingLonglistId) {
              longlistId = existingLonglistId;
            } else {
              longlistId = await socket.invoke('crud', {
                action: 'create',
                type: 'Longlist',
                value: {
                  accountId,
                  companyFilter: getParamValueFromURL('company-filter') || '',
                  peopleFilter: getParamValueFromURL('people-filter') || '',
                  checkedCompanies: getParamValueFromURL('companies') || '',
                  excludedCompanies: getParamValueFromURL('excluded-companies') || ''
                }
              });
            }
            if (!isGeneratingLonglist) return;

            let employeeIds = await getEmployeeIdsByPeopleFilter(companyIds, peopleFilterQuery);

            if (!isGeneratingLonglist) return;

            let personCompanyIdMap = await getCompanyIdsByEmployeesMap(employeeIds);

            if (!isGeneratingLonglist) return;
            
            let presentCompanyIds = Object.values(personCompanyIdMap)
              .filter(Boolean)
              .flatMap(companyId => companyId.split(',').map(id => id.trim()))
              .filter(Boolean);

            let presentCompanySet = new Set(presentCompanyIds);
            let uniqueCompanyIds = [ ...presentCompanySet ];
            
            let uniqueCompanyIdBatches = getBatches(uniqueCompanyIds, generateBatchSize);
            let employeeIdBatches = getBatches(employeeIds, generateBatchSize);

            let companyIdsToInclude = companyIds;
            let companyIdsToIncludeBatches = getBatches(companyIdsToInclude, generateBatchSize);

            let processedBatches = 0;
            let totalBatches = uniqueCompanyIdBatches.length + employeeIdBatches.length + companyIdsToIncludeBatches.length;

            let companyNamesMap = {};

            for (let companyIdBatch of uniqueCompanyIdBatches) {
              let companyNameEntries = await Promise.all(
                companyIdBatch.map(async (companyId) => {
                  let companyName = await socket.invoke('crud', {
                    action: 'read',
                    type: 'Company',
                    id: companyId,
                    field: 'companyName'
                  });
                  return [
                    companyId,
                    companyName
                  ];
                })
              );
              for (let [ companyId, companyName] of companyNameEntries) {
                companyNamesMap[companyId] = companyName;
              }
              processedBatches++;

              if (!isGeneratingLonglist) return;

              updateLonglistGenerationProgress(processedBatches, totalBatches);
            }

            try {
              for (let employeeIdBatch of employeeIdBatches) {
                await Promise.all(
                  employeeIdBatch.map(async (personId) => {
                    try {
                      let [ firstName, lastName ] = await Promise.all([
                        socket.invoke('crud', {
                          action: 'read',
                          type: 'Person',
                          id: personId,
                          field: 'firstName'
                        }),
                        socket.invoke('crud', {
                          action: 'read',
                          type: 'Person',
                          id: personId,
                          field: 'lastName'
                        })
                      ]);
                      let currentCompanyIds = (personCompanyIdMap[personId] || '').split(',')
                        .map(id => id.trim())
                        .filter(Boolean);
                      let currentCompanyId = currentCompanyIds[0];
                      let companyName = companyNamesMap[currentCompanyId] || null;
                      await socket.invoke('crud', {
                        action: 'create',
                        type: 'Candidate',
                        value: {
                          id: computeId(longlistId, personId),
                          personId,
                          longlistId,
                          accountId,
                          firstName,
                          lastName,
                          companyName
                        }
                      });
                    } catch (error) {
                      if (error.name === 'DuplicatePrimaryKeyError') {
                        console.warn(`Employee ${personId} was already added`);
                      } else {
                        throw error;
                      }
                    }
                  })
                );
                processedBatches++;

                if (!isGeneratingLonglist) return;

                updateLonglistGenerationProgress(processedBatches, totalBatches);
              }

              for (let companyIdsToIncludeBatch of companyIdsToIncludeBatches) {
                await Promise.all(
                  companyIdsToIncludeBatch.map(async (companyId) => {
                    try {
                      let companyName = await socket.invoke('crud', {
                        action: 'read',
                        type: 'Company',
                        id: companyId,
                        field: 'companyName'
                      });

                      if (!companyName) return;

                      await socket.invoke('crud', {
                        action: 'create',
                        type: 'Employer',
                        value: {
                          id: computeId(longlistId, companyId),
                          companyId,
                          longlistId,
                          accountId,
                          companyName
                        }
                      });
                    } catch (error) {
                      if (error.name === 'DuplicatePrimaryKeyError') {
                        console.warn(`Company ${companyId} was already added`);
                      } else {
                        throw error;
                      }
                    }
                  })
                );
                processedBatches++;

                if (!isGeneratingLonglist) return;

                updateLonglistGenerationProgress(processedBatches, totalBatches);
              }
            } catch (error) {
              if (error.name === 'DuplicatePrimaryKeyError') {
                console.warn('One or more records were already added');
              } else {
                throw error;
              }
            }
          } catch (error) {
            console.error(error);
            location.hash = `${location.hash.replace(/\/error\/[^\/]*/, '')}/error/unexpected-failure`;
            isGeneratingLonglist = false;
            return;
          }

          // Redirect to the longlist page.
          location.hash = `#/control-panel/longlists/${longlistId}`;

          // location.hash = `${
          //   location.hash.replace(/\/longlist\/[^\/]*/, '').replace(/\/add-to-longlist/, '')
          // }/longlist/${longlistId}`;

          // await new Promise(resolve => setTimeout(resolve, 1000));
          // window.scrollTo(0, document.body.scrollHeight);
        }
        isGeneratingLonglist = false;
      }

      async function shareLonglist(event, longlistId) {
        event.preventDefault();
        let socketProvider = document.querySelector('.main-socket-provider');
        let targetAccountIdElement = event.target.querySelector('input[name=targetAccountId]');
        let targetAccountId = (targetAccountIdElement.value || '').trim();
        let socket = socketProvider.getSocket();
        try {
          if (!socket.authToken) {
            throw new Error('Cannot share a project while not authenticated');
          }
          let accountId = await socket.invoke('crud', {
            action: 'read',
            type: 'Account',
            id: targetAccountId,
            field: 'username'
          });
          if (accountId == null) {
            let error = new Error('Failed to share project due to invalid account ID');
            error.type = 'invalid-account-id';

      async function shareDataGroup(event, dataGroupId) {
        event.preventDefault();
        let socketProvider = document.querySelector('.main-socket-provider');
        let targetAccountIdElement = event.target.querySelector('input[name=targetAccountId]');
        let targetAccountId = (targetAccountIdElement.value || '').trim();
        let socket = socketProvider.getSocket();
        let submitButton = event.target.querySelector('.share-data-group-submit-button');

        try {
          // Disable the submit button
          submitButton.setAttribute('disabled', 'disabled');
          submitButton.value = 'Sharing...';

          if (!socket.authToken) {
            throw new Error('Cannot share a data group while not authenticated');
          }
          let accountId = await socket.invoke('crud', {
            action: 'read',
            type: 'Account',
            id: targetAccountId,
            field: 'username'
          });
          if (accountId == null) {
            let error = new Error('Failed to share data group due to invalid account ID');
            error.type = 'invalid-account-id';
            throw error;
          }

          submitButton.value = 'Loading companies...';

          // Get all Company records associated with this DataGroup
          let companyIds = await getRecordIds(
            socket,
            'Company',
            'groupIdQueryView',
            { dataGroupId, query: '' }
          );

          // Update accountId for each Company
          let totalRecords = companyIds.length;
          let processedRecords = 0;

          for (let companyId of companyIds) {
            await socket.invoke('crud', {
              action: 'update',
              type: 'Company',
              id: companyId,
              value: {
                accountId: `${socket.authToken.accountId}, ${targetAccountId}`
              },
              publisherId
            });
            processedRecords++;
            let progress = Math.round((processedRecords / (totalRecords * 2)) * 100);
            submitButton.value = `Sharing companies (${progress}%)...`;
          }

          submitButton.value = 'Loading people...';

          // Get all Person records associated with this DataGroup
          let personIds = await getRecordIds(
            socket,
            'Person',
            'groupIdQueryView',
            { dataGroupId, query: '' }
          );

          totalRecords += personIds.length;

          // Update accountId for each Person
          for (let personId of personIds) {
            await socket.invoke('crud', {
              action: 'update',
              type: 'Person',
              id: personId,
              value: {
                accountId: `${socket.authToken.accountId}, ${targetAccountId}`
              },
              publisherId
            });
            processedRecords++;
            let progress = Math.round((processedRecords / totalRecords) * 100);
            submitButton.value = `Sharing people (${progress}%)...`;
          }

          submitButton.value = 'Loading jobs...';

          // Get all Job records associated with this DataGroup
          let jobIds = await getRecordIds(
            socket,
            'Job',
            'groupIdQueryView',
            { dataGroupId, query: '' }
          );

          totalRecords += jobIds.length;

          // Update accountId for each Job
          for (let jobId of jobIds) {
            await socket.invoke('crud', {
              action: 'update',
              type: 'Job',
              id: jobId,
              value: {
                accountId: `${socket.authToken.accountId}, ${targetAccountId}`
              },
              publisherId
            });
            processedRecords++;
            let progress = Math.round((processedRecords / totalRecords) * 100);
            submitButton.value = `Sharing jobs (${progress}%)...`;
          }

          submitButton.value = 'Loading educations...';

          // Get all Education records associated with this DataGroup
          let educationIds = await getRecordIds(
            socket,
            'Education',
            'groupIdQueryView',
            { dataGroupId, query: '' }
          );

          totalRecords += educationIds.length;

          // Update accountId for each Education
          for (let educationId of educationIds) {
            await socket.invoke('crud', {
              action: 'update',
              type: 'Education',
              id: educationId,
              value: {
                accountId: `${socket.authToken.accountId}, ${targetAccountId}`
              },
              publisherId
            });
            processedRecords++;
            let progress = Math.round((processedRecords / totalRecords) * 100);
            submitButton.value = `Sharing educations (${progress}%)...`;
          }

          submitButton.value = 'Loading tags...';

          // Get all Tag records associated with this DataGroup
          let tagIds = await getRecordIds(
            socket,
            'Tag',
            'groupIdQueryView',
            { dataGroupId, query: '' }
          );

          totalRecords += tagIds.length;

          // Update accountId for each Tag
          for (let tagId of tagIds) {
            await socket.invoke('crud', {
              action: 'update',
              type: 'Tag',
              id: tagId,
              value: {
                accountId: `${socket.authToken.accountId}, ${targetAccountId}`
              },
              publisherId
            });
            processedRecords++;
            let progress = Math.round((processedRecords / totalRecords) * 100);
            submitButton.value = `Sharing tags (${progress}%)...`;
          }

          submitButton.value = 'Finalizing...';

          // Update the DataGroup itself
          await socket.invoke('crud', {
            action: 'update',
            type: 'DataGroup',
            id: dataGroupId,
            value: {
              accountId: `${socket.authToken.accountId}, ${targetAccountId}`
            },
            publisherId
          });
        } catch (error) {
          console.error(error);
          submitButton.removeAttribute('disabled');
          submitButton.value = 'Share';
          location.hash = `${location.hash.replace(/\/error\/[^\/]*/, '')}/error/${error.type || 'unexpected-failure'}`;
          return;
        }
        submitButton.removeAttribute('disabled');
        submitButton.value = 'Share';
        closeShareDataGroupModal();
        showSuccessModal('data-group-shared');
      }

      async function mergeLonglist(event, sourceLonglistId) {
        event.preventDefault();
        
        let socketProvider = document.querySelector('.main-socket-provider');
        let socket = socketProvider.getSocket();

        // Get the selected target project
        let targetProjectInput = document.querySelector('.merge-target-project-input');
        if (!targetProjectInput) {
          alert('Please select a project to merge with');
          return;
        }

        let targetLonglistId = targetProjectInput.getAttribute('data-project-id');

        // Get the new project name
        let newProjectNameInput = event.target.querySelector('input[name=newProjectName]');
        let newProjectName = (newProjectNameInput.value || '').trim();
        if (!newProjectName) {
          alert('Please enter a name for the merged project');
          return;
        }

        // Show progress indicator
        let submitButton = event.target.querySelector('.merge-longlist-submit-button');
        let originalButtonText = submitButton.value;
        submitButton.value = 'Merging projects...';
        submitButton.disabled = true;

        try {
          if (!socket.authToken) {
            throw new Error('Cannot merge projects while not authenticated');
          }

          // Create a new longlist for the merged project
          submitButton.value = 'Creating new project...';
          let newLonglistId = await socket.invoke('crud', {
            action: 'create',
            type: 'Longlist',
            value: {
              name: newProjectName,
              accountId: socket.authToken.accountId
            },
            publisherId
          });

          // Get all employers from both projects
          submitButton.value = 'Loading companies...';
          let sourceEmployers = await getRecords({
            socket,
            type: 'Employer',
            viewName: 'longlistView',
            viewParams: { longlistId: sourceLonglistId }
          });

          let targetEmployers = await getRecords({
            socket,
            type: 'Employer',
            viewName: 'longlistView',
            viewParams: { longlistId: targetLonglistId }
          });

          // Get all candidates from both projects
          submitButton.value = 'Loading candidates...';
          let sourceCandidates = await getRecords({
            socket,
            type: 'Candidate',
            viewName: 'longlistView',
            viewParams: { longlistId: sourceLonglistId }
          });

          let targetCandidates = await getRecords({
            socket,
            type: 'Candidate',
            viewName: 'longlistView',
            viewParams: { longlistId: targetLonglistId }
          });

          // Combine and deduplicate employers by companyName
          let allEmployers = [...sourceEmployers, ...targetEmployers];
          let seenEmployerKeys = new Set();
          let uniqueEmployers = allEmployers.filter(employer => {
            let employerKey = normalizeString(employer.companyName);
            if (seenEmployerKeys.has(employerKey)) {
              return false;
            }
            seenEmployerKeys.add(employerKey);
            return true;
          });

          // Combine and deduplicate candidates by firstName + lastName + companyName
          let allCandidates = [...sourceCandidates, ...targetCandidates];
          let seenCandidateKeys = new Set();
          let uniqueCandidates = allCandidates.filter(candidate => {
            let candidateKey = `${normalizeString(candidate.firstName)}|${normalizeString(candidate.lastName)}|${normalizeString(candidate.companyName)}`;
            if (seenCandidateKeys.has(candidateKey)) {
              return false;
            }
            seenCandidateKeys.add(candidateKey);
            return true;
          });

          // Copy all unique employers to the new longlist
          let employerBatchSize = 5;
          let employerBatches = getBatches(uniqueEmployers, employerBatchSize);
          let employerBatchCount = employerBatches.length;

          for (let i = 0; i < employerBatchCount; i++) {
            let employerBatch = employerBatches[i];
            let employerProgress = Math.round(((i + 1) / employerBatchCount) * 100);
            submitButton.value = `Copying companies (${employerProgress}%)...`;

            await Promise.all(
              employerBatch.map(async (employer) => {
                let { id, ...employerData } = employer; // Exclude original id
                await socket.invoke('crud', {
                  action: 'create',
                  type: 'Employer',
                  value: {
                    ...employerData,
                    id: computeId(newLonglistId, employer.companyId),
                    longlistId: newLonglistId,
                    accountId: socket.authToken.accountId
                  },
                  publisherId
                });
              })
            );
          }

          // Copy all unique candidates to the new longlist
          let candidateBatchSize = 5;
          let candidateBatches = getBatches(uniqueCandidates, candidateBatchSize);
          let candidateBatchCount = candidateBatches.length;

          for (let i = 0; i < candidateBatchCount; i++) {
            let candidateBatch = candidateBatches[i];
            let candidateProgress = Math.round(((i + 1) / candidateBatchCount) * 100);
            submitButton.value = `Copying candidates (${candidateProgress}%)...`;

            await Promise.all(
              candidateBatch.map(async (candidate) => {
                let { id, promptScore, ...candidateData } = candidate; // Exclude original id and promptScore
                await socket.invoke('crud', {
                  action: 'create',
                  type: 'Candidate',
                  value: {
                    ...candidateData,
                    id: computeId(newLonglistId, candidate.personId),
                    longlistId: newLonglistId,
                    accountId: socket.authToken.accountId
                  },
                  publisherId
                });
              })
            );
          }

        } catch (error) {
          console.error(error);
          // Restore button state on error
          submitButton.value = originalButtonText;
          submitButton.disabled = false;
          location.hash = `${location.hash.replace(/\/error\/[^\/]*/, '')}/error/${error.type || 'unexpected-failure'}`;
          return;
        }

        closeMergeLonglistModal();
        showSuccessModal('longlists-merged');

        // Redirect to the new merged project
        setTimeout(() => {
          location.hash = `#/control-panel/longlists`;
        }, 2000);
      }

      async function updateEmployeeAIScores(longlistId, employeePrompt, recomputeAllEmbeddings) {

        let socketProvider = document.querySelector('.main-socket-provider');
        let employeeAIScoresButton = document.querySelector('.update-employee-ai-scores-button');

        let employeePromptEmbedding = employeePromptEmbeddings[0];
        let employeePromptEmbeddingString = (employeePromptEmbedding || []).join(',');

        let embeddingStringMap = {
          embeddingSummary: (employee) => {
            return employee.summary || '';
          },
          embeddingCurrentCompany: (employee) => {
            let job = employee.jobs?.[0];
            if (job?.jobIsCurrent) {
              return `${job.companyName} - ${job.companyDescription}`;
            }
            return employee.currentCompanyName || 'Unemployed';
          },
          embeddingCurrentJob: (employee) => {
            let job = employee.jobs?.[0];
            if (job?.jobIsCurrent) {
              return `${job.jobTitle} - ${job.companyName} - ${job.jobDescription}`;
            }
            return employee.headline || 'Unemployed';
          },
          embeddingSkills: (employee) => {
            return (employee.skills || '').replace(/\t/g, ', ');
          },
          embeddingEducation: (employee) => {
            let educationsString = (employee.educations || []).map((edu) => {
              return `${edu.eduDegreeName} - ${edu.eduSchoolName} - ${edu.eduEndYear}`;
            }).join('\n');
            return educationsString;
          },
          embeddingLocation: (employee) => {
            return employee.location;
          }
        };

        let embeddingFields = Object.keys(embeddingStringMap);

        let fields = [ 'id', 'personId' ];
        if (!recomputeAllEmbeddings) {
          fields.push(...embeddingFields);
        }

        let maxPages = Math.ceil(maxLonglistLength / maxProcessingPageSize);
        let candidates = await getRecords({
          socket,
          type: 'Candidate',
          viewName: 'longlistView',
          viewParams: {
            longlistId
          },
          fields,
          startPage: 0,
          maxPages,
          pageSize: maxProcessingPageSize
        });

        let candidateBatches = getBatches(candidates, batchSize);
        let batchCount = candidateBatches.length;

        for (let i = 0; i < batchCount; i++) {
          let candidateBatch = candidateBatches[i];

          let employees = await Promise.all(
            candidateBatch.map(async (candidate) => {
              if (embeddingFields.every(field => candidate[field])) {
                return {
                  ...candidate,
                  hasAllEmbeddingFields: true
                };
              }
              let personInfo = await getRecord({
                socket,
                type: 'Person',
                id: candidate.personId,
                fields: [
                  'headline',
                  'currentCompanyName',
                  'summary',
                  'skills',
                  'seniority',
                  'education',
                  'location',
                  'numberOfConnections',
                  'tags'
                ]
              })
              let jobs = await getRecords({
                socket,
                type: 'Job',
                viewName: 'personView',
                viewParams: { personId: candidate.personId },
                fields: [
                  'companyName',
                  'companyDescription',
                  'jobTitle',
                  'jobDescription',
                  'jobIsCurrent'
                ],
                startPage: 0,
                maxPages: 1,
                pageSize: 1
              });
              let educations = await getRecords({
                socket,
                type: 'Education',
                viewName: 'personView',
                viewParams: { personId: candidate.personId },
                fields: [
                  'eduDegreeName',
                  'eduSchoolName',
                  'eduEndYear'
                ]
              });
              return {
                ...personInfo,
                ...candidate,
                jobs,
                educations
              };
            })
          );

          let employeeFieldEmbeddingEntries = await Promise.all(
            embeddingFields.map(async (embeddingField) => {
              let employeeSourceFieldValues = employees.map(
                employee => employee.hasAllEmbeddingFields ? null : embeddingStringMap[embeddingField](employee)
              );
              let employeeFieldEmbeddings = await computeVectorEmbeddings(employeeSourceFieldValues);
              return [ embeddingField, employeeFieldEmbeddings ];
            })
          );

          await Promise.all(
            employees.map(async (employee, j) => {
              let optionalInfo = {};
              let currentEmployeeEmbeddings = {};
              for (let [ embeddingField, employeeFieldEmbeddings ] of employeeFieldEmbeddingEntries) {
                let currentEmbeddingValue = employeeFieldEmbeddings[j];
                if (currentEmbeddingValue == null) {
                  currentEmbeddingValue = employee[embeddingField].split(',');
                } else {
                  optionalInfo[embeddingField] = currentEmbeddingValue.join(',');
                }
                currentEmployeeEmbeddings[embeddingField] = currentEmbeddingValue;
              }

              let embeddingSimilarities = Object.values(currentEmployeeEmbeddings).map((embeddingFieldVector) => {
                return computeVectorSimilarity(embeddingFieldVector, employeePromptEmbedding);
              });

              let promptScore = softmax(embeddingSimilarities, .2);

              await socket.invoke('crud', {
                action: 'update',
                type: 'Candidate',
                id: employee.id,
                publisherId,
                value: {
                  ...optionalInfo,
                  promptScore
                }
              });
            })
          );
          
          let progress = Math.round(i * 100 / batchCount);
          employeeAIScoresButton.value = `Updating scores: ${progress}%`;
        }
        
        await socket.invoke('crud', {
          action: 'update',
          type: 'Longlist',
          id: longlistId,
          publisherId,
          field: 'employeePromptEmbedding',
          value: employeePromptEmbeddingString
        });
        employeeAIScoresButton.value = 'Update scores';
        employeeAIScoresButton.removeAttribute('disabled');
      }

      async function tagDataGroupRecords(dataGroupId) {
        let batchSize = 3;
        let socketProvider = document.querySelector('.main-socket-provider');
        let tagRecordsButton = document.querySelector('.tag-records-button');
        let progressElement = document.querySelector('.tag-records-progress');

        if (!socketProvider) {
          console.error('Socket provider not found');
          return;
        }

        let socket = socketProvider.getSocket();
        let accountId = socket.authToken?.accountId;

        if (!accountId) {
          progressElement.textContent = 'Error: Not authenticated';
          progressElement.className = 'tag-records-progress error';
          return;
        }

        if (!dataGroupId) {
          progressElement.textContent = 'Error: No data group selected';
          progressElement.className = 'tag-records-progress error';
          return;
        }

        tagRecordsButton.setAttribute('disabled', '');
        progressElement.textContent = 'Loading tags...';
        progressElement.className = 'tag-records-progress';

        try {
          // Get all tags from the data group
          let tags = await getRecords({
            socket,
            type: 'Tag',
            viewName: 'groupIdQueryView',
            viewParams: { dataGroupId },
            fields: [ 'id', 'name', 'description' ]
          });

          progressElement.textContent = `Computing embeddings for ${tags.length} tags...`;

          // Compute category embeddings for each tag
          // Filter out tags without valid description or name
          let validTags = tags.filter(tag => (tag.description && tag.description.trim()) || (tag.name && tag.name.trim()));

          // Create category objects with tag name and category text
          // The API expects: [{ tag: "tagName", category: "description text", sensitivity, focus }, ...]
          let categories = validTags.map(tag => {
            let categoryText = tag.description && tag.description.trim() ? tag.description.trim() : tag.name.trim();
            return {
              tag: tag.name,
              category: categoryText,
              sensitivity: 0.5,
              focus: {
                headline: 0.5,
                summary: 0.5,
                skills: 0.5,
                jobs: 0.5,
                educations: 0.5
              }
            };
          });

          let categoryEmbeddings;

          if (categories.length) {
            let categoryEmbeddingsResponse = await fetch(`${window.config.dataMinerURL || 'https://saasufy.com/insnare/api'}/ai/compute-category-embeddings`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ categories })
            });

            if (!categoryEmbeddingsResponse.ok) {
              let errorResult = await categoryEmbeddingsResponse.json();
              throw new Error(errorResult.message || 'Failed to compute category embeddings');
            }

            let categoryEmbeddingsResult = await categoryEmbeddingsResponse.json();
            categoryEmbeddings = categoryEmbeddingsResult.categoryEmbeddings;

            // Add tag names back to the category embeddings
            categoryEmbeddings = categoryEmbeddings.map((categoryEmbedding, index) => ({
              ...categoryEmbedding,
              tag: validTags[index].name
            }));
          } else {
            categoryEmbeddings = [];
          }

          progressElement.textContent = 'Loading person records...';

          // Get all person records from the data group
          let personIds = await getRecordIds(
            socket,
            'Person',
            'groupIdQueryView',
            { dataGroupId },
            0,
            1000,
            100
          );

          if (!personIds || personIds.length === 0) {
            progressElement.textContent = 'No person records found in this data group';
            progressElement.className = 'tag-records-progress';
            tagRecordsButton.removeAttribute('disabled');
            return;
          }

          let personIdBatches = getBatches(personIds, batchSize);
          let totalBatches = personIdBatches.length;

          progressElement.textContent = `Tagging ${personIds.length} person records in ${totalBatches} batches...`;

          // Process each batch of person records
          for (let i = 0; i < totalBatches; i++) {
            let personIdBatch = personIdBatches[i];

            await Promise.all(
              personIdBatch.map(async (personId) => {
                try {
                  let person = await getRecord({
                    socket,
                    type: 'Person',
                    id: personId,
                    fields: [
                      'firstName',
                      'lastName',
                      'headline',
                      'summary',
                      'skills',
                      'seniority',
                      'education',
                      'location'
                    ]
                  });

                  let jobs = await getRecords({
                    socket,
                    type: 'Job',
                    viewName: 'personView',
                    viewParams: { personId },
                    fields: [
                      'companyName',
                      'jobTitle',
                      'jobDescription',
                      'jobIsCurrent',
                      'jobStartTimestamp',
                      'jobEndTimestamp'
                    ]
                  });

                  let educations = await getRecords({
                    socket,
                    type: 'Education',
                    viewName: 'personView',
                    viewParams: { personId },
                    fields: [
                      'eduDegreeName',
                      'eduFieldOfStudy',
                      'eduSchoolName',
                      'eduEndYear'
                    ]
                  });

                  person.jobs = jobs;
                  person.educations = educations;

                  // Call AI endpoint to tag this person
                  let tagPersonResponse = await fetch(`${window.config.dataMinerURL || 'https://saasufy.com/insnare/api'}/ai/tag-person`, {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                      person,
                      categoryEmbeddings,
                      // scoreThreshold: 0.075,
                      scoreThreshold: 0.12,
                      temperature: 0.2,
                      propWeights: {
                        headline: 6,
                        summary: 4,
                        skills: 5,
                        jobs: 2,
                        educations: 2
                      },
                      maxJobExpCategories: 3,
                      redundancyPenaltyFactor: 0.1
                      // redundancyPenaltyFactor: 0.25
                    })
                  });

                  if (!tagPersonResponse.ok) {
                    console.error(`Failed to tag person ${personId}`);
                    return;
                  }

                  let tagPersonResult = await tagPersonResponse.json();
                  let categoryInfos = tagPersonResult.tags || [];

                  let personSnakeCase = {
                    public_id: person.publicId,
                    first_name: person.firstName,
                    last_name: person.lastName,
                    headline: person.headline,
                    summary: person.summary,
                    skills: typeof person.skills === 'string' ? person.skills.split('\t') : (person.skills || []),
                    jobs: (person.jobs || []).map(job => ({
                      title: job.jobTitle,
                      description: job.jobDescription,
                      is_current: job.jobIsCurrent,
                      start_timestamp: job.jobStartTimestamp,
                      end_timestamp: job.jobEndTimestamp,
                      company_name: job.jobCompanyName || job.companyName
                    })),
                    edus: (person.educations || []).map(edu => ({
                      degree_name: edu.eduDegreeName,
                      field_of_study: edu.eduFieldOfStudy,
                      school_name: edu.eduSchoolName
                    }))
                  };

                  // Process with DataMiner to get saasufy_seniority tags
                  let taggedPerson = (await processWithDataMiner([ personSnakeCase ]))[0];
                  let dataMinerTags = taggedPerson?.added_props?.inferred?.saasufy_seniority || {};

                  let dataMinerTagList = Object.entries(dataMinerTags).flatMap(([ key, yearsValue ]) => {
                    let normalizedKey = key.replace(/_/g, '-');
                    return [
                      `position:${normalizedKey}`,
                      `position:${normalizedKey}.${yearsValue}`,
                      `skill:${normalizedKey}`,
                      `skill:${normalizedKey}.${yearsValue}`
                    ];
                  });

                  let aiTags = categoryInfos.flatMap(cat => {
                    if (!cat.tag) return [];

                    let tags = [ cat.tag ];

                    if (cat.experience != null) {
                      let expSuffix = getExpTagSuffix(cat.experience);
                      tags.push(`${cat.tag}${expSuffix}`);
                    }

                    return tags;
                  });

                  // Merge and deduplicate tags
                  let allTags = [ ...new Set([ ...dataMinerTagList, ...aiTags ]) ];
                  let tagsString = allTags.join('\t');
                  await socket.invoke('crud', {
                    action: 'update',
                    type: 'Person',
                    id: personId,
                    publisherId,
                    value: {
                      tags: tagsString
                    }
                  });
                } catch (error) {
                  console.error(`Error tagging person ${personId}:`, error);
                }
              })
            );

            let progress = Math.round(((i + 1) / totalBatches) * 100);
            progressElement.textContent = `Tagging progress: ${progress}% (${i + 1}/${totalBatches} batches)`;
          }

          progressElement.textContent = `Successfully tagged ${personIds.length} person records`;
          progressElement.className = 'tag-records-progress success';
        } catch (error) {
          console.error('Error tagging records:', error);
          progressElement.textContent = `Error: ${error.message}`;
          progressElement.className = 'tag-records-progress error';
        } finally {
          tagRecordsButton.removeAttribute('disabled');
        }
      }

                for (let edu of educations) {
                  delete edu.updatedByIp;
                  delete edu.accountId;

                employee.jobs = jobs;
                employee.educations = educations;
              }
              delete employee.accountId;
              delete employee.updatedByIp;
              employees.push({
                ...employee,
                previousLocations: employee.previousLocations ? employee.previousLocations.split('\t') : [],
                skills: employee.skills ? employee.skills.split('\t') : [],
                desiredTitles: employee.desiredTitles	? employee.desiredTitles.split('\t') : [],
                desiredEmploymentTypes: employee.desiredEmploymentTypes	? employee.desiredEmploymentTypes.split('\t') : [],
                specializations: employee.specializations ? employee.specializations.split('\t') : [],
                recommendations: employee.recommendations ? employee.recommendations.split('\t') : [],
                status: candidate.status,
                promptScore: candidate.promptScore
              });
              if (candidate.promptScore != null) {
                areCandidatesScored = true;
              }
            } catch (error) {
              console.warn(`Failed to read person ${candidate.personId}`);
            }

        return matches[1];

      let tagExpPartRegExp = /(\.years-0\b|\.years-1\b|\.years-5\b|\.years-10\b|\.years-any\b)/;

      function extractCompanyTagExperiencePart(value) {
        let matches = value.match(tagExpPartRegExp);
        if (!matches || !matches[1]) {
          return companyDefaultFieldParts.tags[1];
        }
        return matches[1];
      }

        if (!matches || !matches[1]) {
          return '';
        }
        return matches[1];
      }

      function extractPersonTagExperiencePart(value) {
        let matches = value.match(tagExpPartRegExp);
        if (!matches || !matches[1]) {
          return '.years-any';
        }
        return matches[1];
      }

      let tagMetricRegExp = /(\.percent-low|\.percent-medium|\.percent-high|\.count-[0-9]+)\b/;

        let matches = value.match(tagMetricRegExp);

      function getExperienceCompanySelectOptions(value) {

        if (isEdu) return '=.years-any';
        return `
          who have any experience=.years-any,
          who have <1 year of experience=.years-0,
          who have 1 to 5 years of experience=.years-1,
          who have 5 to 10 years of experience=.years-5,
          who have 10+ years of experience=.years-10
        `;
      }

      function getDisciplineCompanySelectOptions() {
        let minimalView = getParamValueFromURL('minimal-view');

        let hardwareOptions = [
          'Electronics engineers=position:electronics-engineering',
          'Systems engineers=position:systems-engineering',
          'Mechanical engineers=position:mechanical-engineering',
          'Optical engineers=position:optical-engineering'
        ];
        let softwareOptions = [
          'Founders=position:founder',
          'Directors=position:director',
          'Exec directors=position:executive-director',
          'Engineering bachelor graduates=edu:engineering-bachelor',
          'Engineering master graduates=edu:engineering-master',
          'Engineering PhD graduates=edu:engineering-phd'
        ];
        if (minimalView === 'hardware') {
          return [ ...hardwareOptions ].join(', ');
        }
        if (minimalView === 'software') {
          return [ ...softwareOptions ].join(', ');
        }
        return [ ...hardwareOptions, ...softwareOptions ].join(', ');
      }

      function getAllCompanyFiltersFromURL() {
        let companyFilter = decodeURIComponent(getParamValueFromURL('company-filter'));
        let companyFilterParts = companyFilter.split(' ~AND~ ');
        let params = {};
        for (let part of companyFilterParts) {
          let firstSpaceIndex = part.indexOf(' ');
          if (firstSpaceIndex !== -1) {
            let filterField = part.slice(0, firstSpaceIndex);
            if (filterField) {
              params[filterField] = part;
            }
          }
        }
        return params;
      }

      function getTagIndexPart(index, part) {
        let value = part || companyDefaultFieldParts.tags[index];
        return `tags.${index} index-equals ${value}`;
      }

      function computeURLWithCompanyFilters(value) {
        let tagBasePart = getFilterFromLocationHash('company-filter', 'tags', 'index-equals', extractCompanyTagBasePart);
        let tagExpPart = getFilterFromLocationHash('company-filter', 'tags', 'index-equals', extractCompanyTagExperiencePart);
        let tagMetricPart = getFilterFromLocationHash('company-filter', 'tags', 'index-equals', extractCompanyTagMetricPart);
        let currentView = getParamValueFromURL('dashboard') || 'company-view';

        let { tags, ...basicFilters } = getAllCompanyFiltersFromURL();

        let newURL = getURLWithCompanyFilters({
          ...basicFilters,
          'tags.0': getTagIndexPart(0, tagBasePart),
          'tags.1': getTagIndexPart(1, tagExpPart),
          'tags.2': getTagIndexPart(2, tagMetricPart),
          ...value
        }, getParamValueFromURL(currentView) || 'table');

        let newTagBasePart = getFilterFromURL(newURL, 'company-filter', 'tags', 'index-equals', extractCompanyTagBasePart);
        let newTagExpPart = getFilterFromURL(newURL, 'company-filter', 'tags', 'index-equals', extractCompanyTagExperiencePart);
        if (newTagBasePart && (newTagBasePart !== tagBasePart || tagExpPart !== newTagExpPart)) {
          newTagBasePart = newTagBasePart.replace(/^in-position/, 'position');
          let newTagWithExp = getBaseExpTag(newTagBasePart, newTagExpPart);
          let peopleFilter = getPartFromURL('people-filter');
          let newPeopleFilter = setFilterInURLPart(peopleFilter, 'tags', 'contains', newTagWithExp);
          // Set the people tag to match the base company discipline (position) tag.
          newURL = getHashURLWithParamValues(newURL, { 'people-filter': newPeopleFilter });
        }
        return newURL;
      }

      function getURLWithDataGroupId(dataGroupId) {
        let oldDataGroupId = getParamValueFromURL('source-id');
        let params = {
          'source-id': dataGroupId
        };
        // Only reset page numbers if data group actually changed
        if (dataGroupId !== oldDataGroupId) {
          params['company-page'] = 1;
          params['employee-page'] = 1;
        }
        return getURLWithParamValues(params, true);
      }

      function getURLWithDataSource(sourceType) {
        let companyFilter = getParamValueFromURL('company-filter');
        let peopleFilter = getParamValueFromURL('people-filter');
        let newArgs = {
          'data-source': sourceType || 'main',
          'company-page': '1',
          'employee-page': '1'
        };
        // When switching to custom data view, remove the default people tags filter.
        // Restore tags filter when switching back to main data view.
        if (sourceType === 'custom') {
          newArgs['people-filter'] = removeFilterFromURLPart(peopleFilter, 'tags', 'contains');
        } else {
          let companyTags = getFilterFromURLPart(companyFilter, 'tags', 'index-equals');
          newArgs['people-filter'] = setFilterInURLPart(peopleFilter, 'tags', 'contains', companyTags);
        }
        return getURLWithParamValues(newArgs, true);
      }

      function setDataSource(sourceType) {
        location.hash = getURLWithDataSource(sourceType);
        document.querySelector('.dashboard-app-router').refreshCurrentPage();
      }

      function getCustomDataTabsComponent() {
        let isCustomData = getParamValueFromURL('data-source') === 'custom';
        return `
          <div class="nav-tab-container">
            <div class="tab-button${isCustomData ? '' : ' active'}" onclick="setDataSource('main')">Main Data</div>
            <div class="tab-button${isCustomData ? ' active' : ''}" onclick="setDataSource('custom')">Custom Data</div>
          </div>
        `;
      }

      async function searchCompany(event) {
        event.target?.classList.remove('error');
        if (event.keyCode === 13) {
          let searchQuery = event.target.value;
          if (searchQuery) {
            let socketProvider = document.querySelector('.main-socket-provider');
            let socket = socketProvider.getSocket();
            let queryParts = await Promise.all(
              searchQuery.split(/(?:,|\|)/)
                .map(part => part.trim())
                .map(async (id) => {
                  if (id.length === 36) {
                    return id;
                  }
                  let companies = await getRecords({
                    socket,
                    type: 'Company',
                    viewName: 'groupIdCompanyIdView',
                    viewParams: {
                      dataGroupId: null,
                      companyId: id
                    },
                    fields: [ 'id' ],
                    startPage: 0,
                    maxPages: 1,
                    pageSize: 1
                  });
                  return companies[0]?.id;
                })
            );
            if (queryParts[0]) {
              showCompanyInfoModal(queryParts[0], queryParts, 'simple');
            } else {
              event.target?.classList.add('error');
            }
          }
        }
      }

      function getCompanyQuickSearchComponent() {
        return `
          <input
            type="text"
            class="company-quick-search-input lg-hidden"
            placeholder="Browse Companies by LI IDs"
            onkeydown="searchCompany(event)"
          >
        `;
      }

      function getCompanySelectionStatusComponent() {
        return `
          <app-router class="company-selection-status" force-render-paths="">
            <template slot="page" route-path="/companies/:companyIds/?.*/selected-companies/:selectedCompanyIds" partial-route>
              {{{getCompanySelectionStatusElement(companyIds, selectedCompanyIds)}}}
            </template>
            <template slot="page" route-path="/companies/:companyIds" partial-route>
              {{{getCompanySelectionStatusElement(companyIds)}}}
            </template>
            <div slot="viewport"></div>
          </app-router>
        `;
      }

      function getCompanySelectionStatusElement(companyIds, selectedCompanyIds) {
        if (!selectedCompanyIds) {
          selectedCompanyIds = getParamValueFromURL('selected-companies');
        }
        let companySelectionCount = computeIncludedCompanyIds()
          .filter(companyId => companyId !== nullCompanyId).length;
        let selectionCountText = companySelectionCount === 1 ? '1 company' : `${companySelectionCount} companies`;
        return `
          <div class="company-selection-status-text ${companySelectionCount? 'ready': 'empty'}">
            Your <a href="javascript: showCompanySelectionModal()">selection</a> contains ${selectionCountText}
          </div>
        `;
      }

      function computeIncludedCompanyIds(_, includeMaximum) {
        let companyIdsString = getParamValueFromURL('companies');
        let companyIds = companyIdsString.split('+').filter(companyId => companyId);

        let selectedCompaniesString = getParamValueFromURL('selected-companies') || '';
        let filterCompanyIds = selectedCompaniesString
          .split('+')
          .filter(companyId => companyId);
          
        let companyIdSet = new Set([ ...filterCompanyIds, ...companyIds ]);
        if (!includeMaximum) {
          companyIdSet = new Set([ ...filterCompanyIds, ...companyIds ]);
          let excludedCompanyIdsString = getParamValueFromURL('excluded-companies') || '';
          let excludedCompanyIds = excludedCompanyIdsString.split('+').filter(companyId => companyId);
          for (let excludedId of excludedCompanyIds) {
            companyIdSet.delete(excludedId);
          }
        }
        return [ ...companyIdSet ];
      }
    </script>
